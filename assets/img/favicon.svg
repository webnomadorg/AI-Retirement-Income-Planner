      <stop offset="0" stop-color="#1F4E79"/>
      <stop offset="1" stop-color="#12283F"/>
    </linearGradient>
  </defs>
  <rect x="2" y="2" width="60" height="60" rx="16" fill="url(#wn-navy)"/>
